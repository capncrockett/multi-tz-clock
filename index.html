<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-TZ Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --bg-surface: #16213e;
    --border: #0f3460;
    --text: #eeeeee;
    --text-muted: #aaaaaa;
    --accent: #e94560;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f0f0f5;
      --bg-surface: #ffffff;
      --border: #c0c0d0;
      --text: #1a1a2e;
      --text-muted: #555555;
      --accent: #c0392b;
    }
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  .skip-link {
    position: absolute;
    top: -100px; left: 0;
    background: var(--accent); color: #fff;
    padding: 8px 16px; z-index: 100;
    font-size: 14px; text-decoration: none;
    border-radius: 0 0 4px 0;
  }
  .skip-link:focus { top: 0; }

  #controls {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  #controls label {
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  #controls select, #controls button {
    background: var(--bg-surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }
  #controls button:hover { filter: brightness(1.2); }
  #controls select:focus,
  #controls input:focus,
  #controls button:focus {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ── TZ picker ── */
  #tz-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  #tz-bar select {
    background: var(--bg-surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 13px;
    max-width: 220px;
  }
  #tz-bar button {
    background: var(--bg-surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }
  #tz-bar button:hover { filter: brightness(1.2); }
  #tz-bar button:focus, #tz-bar select:focus {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .tz-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2px 8px 2px 4px;
    font-size: 12px;
  }
  .tz-chip-swatch {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .tz-chip button {
    background: none; border: none;
    color: var(--text-muted);
    cursor: pointer; font-size: 14px;
    padding: 0 2px;
    line-height: 1;
  }
  .tz-chip button:hover { color: var(--accent); }
  .tz-chip button:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  canvas { display: block; }

  #legend {
    margin-top: 12px;
    display: flex;
    gap: 12px 20px;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    max-width: 600px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .legend-swatch {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--text-muted);
    flex-shrink: 0;
  }
  .legend-time {
    font-family: 'Cascadia Mono', 'Consolas', monospace;
    opacity: 0.75;
    font-size: 13px;
  }

  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
  }

  @media (max-width: 400px) {
    #controls { gap: 6px; }
    #controls label { font-size: 12px; }
    #tz-bar { gap: 4px; }
    #legend {
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
  }
</style>
</head>
<body>

<a class="skip-link" href="#legend">Skip to time legend</a>

<div id="controls" role="toolbar" aria-label="Clock display options">
  <label>Labels:
    <select id="labelMode" aria-label="Label display mode">
      <option value="tip">At hand tip</option>
      <option value="arc">Arc along hand</option>
      <option value="legend">Legend only</option>
    </select>
  </label>
  <label>
    <input type="checkbox" id="showSeconds" checked aria-label="Toggle second hand">
    Seconds
  </label>
  <label>
    <input type="checkbox" id="use24h" aria-label="Toggle 24-hour clock">
    24h
  </label>
</div>

<div id="tz-bar" role="region" aria-label="Time zone selection"></div>

<canvas id="clock" role="img" aria-label="Analog clock displaying multiple time zones"></canvas>

<div id="sr-times" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<div id="legend" role="list" tabindex="0" aria-label="Time zone legend"></div>

<script>
// ── CITY CATALOG ────────────────────────────────────────────────────
// Curated list grouped by region. Covers all major offsets.
const CITY_CATALOG = [
  { label: 'Baker Island',   tz: 'Etc/GMT+12' },
  { label: 'Pago Pago',     tz: 'Pacific/Pago_Pago' },
  { label: 'Honolulu',      tz: 'Pacific/Honolulu' },
  { label: 'Anchorage',     tz: 'America/Anchorage' },
  { label: 'Los Angeles',   tz: 'America/Los_Angeles' },
  { label: 'Denver',        tz: 'America/Denver' },
  { label: 'Chicago',       tz: 'America/Chicago' },
  { label: 'NYC',           tz: 'America/New_York' },
  { label: 'Halifax',       tz: 'America/Halifax' },
  { label: 'São Paulo',     tz: 'America/Sao_Paulo' },
  { label: 'Buenos Aires',  tz: 'America/Argentina/Buenos_Aires' },
  { label: 'Reykjavik',     tz: 'Atlantic/Reykjavik' },
  { label: 'London',        tz: 'Europe/London' },
  { label: 'Paris',         tz: 'Europe/Paris' },
  { label: 'Berlin',        tz: 'Europe/Berlin' },
  { label: 'Cairo',         tz: 'Africa/Cairo' },
  { label: 'Istanbul',      tz: 'Europe/Istanbul' },
  { label: 'Moscow',        tz: 'Europe/Moscow' },
  { label: 'Dubai',         tz: 'Asia/Dubai' },
  { label: 'Karachi',       tz: 'Asia/Karachi' },
  { label: 'Mumbai',        tz: 'Asia/Kolkata' },
  { label: 'Kathmandu',     tz: 'Asia/Kathmandu' },
  { label: 'Dhaka',         tz: 'Asia/Dhaka' },
  { label: 'Bangkok',       tz: 'Asia/Bangkok' },
  { label: 'Singapore',     tz: 'Asia/Singapore' },
  { label: 'Beijing',       tz: 'Asia/Shanghai' },
  { label: 'Hong Kong',     tz: 'Asia/Hong_Kong' },
  { label: 'Tokyo',         tz: 'Asia/Tokyo' },
  { label: 'Seoul',         tz: 'Asia/Seoul' },
  { label: 'Sydney',        tz: 'Australia/Sydney' },
  { label: 'Auckland',      tz: 'Pacific/Auckland' },
];

const HAND_COLORS = [
  '#e94560', '#4e9af1', '#53d8fb', '#e9b44c', '#2ecc71', '#e67e22',
];
const MAX_ZONES = 6;

// ── STATE ───────────────────────────────────────────────────────────
let zones = [
  { label: 'NYC',    tz: 'America/New_York',    color: HAND_COLORS[0] },
  { label: 'London', tz: 'Europe/London',       color: HAND_COLORS[1] },
  { label: 'Tokyo',  tz: 'Asia/Tokyo',          color: HAND_COLORS[2] },
  { label: 'Sydney', tz: 'Australia/Sydney',     color: HAND_COLORS[3] },
];

const canvas = document.getElementById('clock');
const ctx = canvas.getContext('2d');
let isSmall = false;
let lastSrUpdate = -1;

function isLightMode() {
  return window.matchMedia('(prefers-color-scheme: light)').matches;
}
function is24h() {
  return document.getElementById('use24h').checked;
}

// ── SIZING ──────────────────────────────────────────────────────────
function resize() {
  const dpr = window.devicePixelRatio || 1;
  const size = Math.min(window.innerWidth - 32, window.innerHeight - 220, 600);
  isSmall = size < 300;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ── HELPERS ─────────────────────────────────────────────────────────
function getTimeInTZ(tz) {
  const now = new Date();
  const str = now.toLocaleString('en-US', {
    timeZone: tz,
    hour: 'numeric', minute: 'numeric', second: 'numeric',
    hour12: false
  });
  const [h, m, s] = str.split(':').map(Number);
  return { h: h % 12, m, s, h24: h };
}

function dedupeZones(list) {
  const map = new Map();
  for (const z of list) {
    const t = getTimeInTZ(z.tz);
    const key = t.h;
    if (map.has(key)) {
      const existing = map.get(key);
      if (!existing.label.includes(z.label)) {
        existing.label += ' / ' + z.label;
      }
    } else {
      map.set(key, { ...z, label: z.label, _time: t });
    }
  }
  return Array.from(map.values());
}

function sortByTime(deduped) {
  return [...deduped].sort((a, b) => {
    const ta = a._time || getTimeInTZ(a.tz);
    const tb = b._time || getTimeInTZ(b.tz);
    return (ta.h24 * 60 + ta.m) - (tb.h24 * 60 + tb.m);
  });
}

// ── TZ PICKER ───────────────────────────────────────────────────────
function renderTzBar() {
  const bar = document.getElementById('tz-bar');
  // Chips for active zones
  let html = zones.map((z, i) => `
    <span class="tz-chip">
      <span class="tz-chip-swatch" style="background:${z.color}" aria-hidden="true"></span>
      ${z.label}
      <button onclick="removeZone(${i})" aria-label="Remove ${z.label}">&times;</button>
    </span>
  `).join('');

  // Add dropdown (if under cap)
  if (zones.length < MAX_ZONES) {
    const usedTzs = new Set(zones.map(z => z.tz));
    const opts = CITY_CATALOG
      .filter(c => !usedTzs.has(c.tz))
      .map(c => `<option value="${c.tz}">${c.label}</option>`)
      .join('');
    html += `
      <select id="addTzSelect" aria-label="Add a time zone">
        <option value="">+ Add city…</option>
        ${opts}
      </select>
    `;
  }
  bar.innerHTML = html;

  // Bind change
  const sel = document.getElementById('addTzSelect');
  if (sel) {
    sel.addEventListener('change', () => {
      if (!sel.value) return;
      addZone(sel.value);
    });
  }
}

function addZone(tz) {
  if (zones.length >= MAX_ZONES) return;
  const city = CITY_CATALOG.find(c => c.tz === tz);
  if (!city) return;
  // Pick next unused color
  const usedColors = new Set(zones.map(z => z.color));
  const color = HAND_COLORS.find(c => !usedColors.has(c)) || HAND_COLORS[zones.length % HAND_COLORS.length];
  zones.push({ label: city.label, tz: city.tz, color });
  renderTzBar();
}

function removeZone(index) {
  zones.splice(index, 1);
  renderTzBar();
}
// Expose to inline onclick
window.removeZone = removeZone;

renderTzBar();

// ── DAY/NIGHT CLOCK FACE ────────────────────────────────────────────
function drawDayNightFace(cx, cy, r) {
  const light = isLightMode();
  // Warmer, sunnier day colors
  const dayColor   = light ? '#f5e6c8' : '#2e3a1e';
  const dayCenter  = light ? '#fdf0d5' : '#3d4a28';
  const nightColor = light ? '#d0cfc8' : '#0d1321';
  const midColor   = light ? '#e8d8b8' : '#1a2418';

  // Night base
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = nightColor;
  ctx.fill();

  // Day semicircle (top half) with radial warm gradient
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx - r, cy);
  ctx.arc(cx, cy, r, Math.PI, 0);
  ctx.closePath();
  ctx.clip();
  const dayGrad = ctx.createRadialGradient(cx, cy - r * 0.3, 0, cx, cy - r * 0.3, r * 1.1);
  dayGrad.addColorStop(0, dayCenter);
  dayGrad.addColorStop(0.6, dayColor);
  dayGrad.addColorStop(1, midColor);
  ctx.fillStyle = dayGrad;
  ctx.fillRect(cx - r, cy - r, r * 2, r);
  ctx.restore();

  // Soft horizon blend
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.clip();
  const horizGrad = ctx.createLinearGradient(cx, cy - 16, cx, cy + 16);
  horizGrad.addColorStop(0, midColor);
  horizGrad.addColorStop(0.5, light ? '#ddd0b0' : '#151d18');
  horizGrad.addColorStop(1, nightColor);
  ctx.fillStyle = horizGrad;
  ctx.fillRect(cx - r, cy - 16, r * 2, 32);
  ctx.restore();

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = light ? '#b0b0b8' : '#0f3460';
  ctx.lineWidth = 3;
  ctx.stroke();
}

// ── DRAWING ─────────────────────────────────────────────────────────
function drawFace(cx, cy, r) {
  drawDayNightFace(cx, cy, r);
  const light = isLightMode();
  const use24 = is24h();

  // Tick marks — skip minute ticks on small viewports
  for (let i = 0; i < 60; i++) {
    const isHour = i % 5 === 0;
    if (isSmall && !isHour) continue;
    const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const inner = r * (isHour ? 0.82 : 0.88);
    const outer = r * 0.92;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * inner, cy + Math.sin(angle) * inner);
    ctx.lineTo(cx + Math.cos(angle) * outer, cy + Math.sin(angle) * outer);
    ctx.strokeStyle = isHour
      ? (light ? '#333' : '#eee')
      : (light ? '#999' : '#555');
    ctx.lineWidth = isHour ? 2.5 : 1;
    ctx.stroke();
  }

  // Numerals
  const count = use24 ? 24 : 12;
  const fontSize = isSmall ? r * 0.14 : (use24 ? r * 0.10 : r * 0.14);
  ctx.fillStyle = light ? '#222' : '#ddd';
  ctx.font = `bold ${fontSize}px "Segoe UI", system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let n = 1; n <= count; n++) {
    const angle = (n / count) * Math.PI * 2 - Math.PI / 2;
    const nr = use24 ? r * 0.68 : r * 0.72;
    ctx.fillText(n.toString(), cx + Math.cos(angle) * nr, cy + Math.sin(angle) * nr);
  }

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, isSmall ? 3 : 5, 0, Math.PI * 2);
  ctx.fillStyle = light ? '#333' : '#eee';
  ctx.fill();
}

function drawHand(cx, cy, angle, length, width, color, label, labelMode) {
  const tipX = cx + Math.cos(angle) * length;
  const tipY = cy + Math.sin(angle) * length;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(tipX, tipY);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  // Tip label
  if (label && labelMode === 'tip') {
    const labelR = length + (isSmall ? 12 : 18);
    const lx = cx + Math.cos(angle) * labelR;
    const ly = cy + Math.sin(angle) * labelR;
    const fs = isSmall ? 9 : 11;
    ctx.save();
    ctx.font = `bold ${fs}px "Segoe UI", system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const tw = ctx.measureText(label).width + 6;
    const th = fs + 4;
    ctx.fillStyle = isLightMode() ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.6)';
    ctx.beginPath();
    ctx.roundRect(lx - tw / 2, ly - th / 2, tw, th, 3);
    ctx.fill();
    ctx.fillStyle = color;
    ctx.fillText(label, lx, ly);
    ctx.restore();
  }

  // Arc label along the hand
  if (label && labelMode === 'arc') {
    const fs = isSmall ? 8 : 10;
    ctx.save();
    ctx.font = `bold ${fs}px "Segoe UI", system-ui, sans-serif`;
    const chars = label.split('');
    const charSpacing = fs * 0.9;
    const totalLen = chars.length * charSpacing;
    const startR = Math.max(length * 0.3, length - totalLen - 10);
    for (let i = 0; i < chars.length; i++) {
      const cr = startR + i * charSpacing;
      if (cr > length) break;
      const px = cx + Math.cos(angle) * cr;
      const py = cy + Math.sin(angle) * cr;
      // Background for each char
      ctx.fillStyle = isLightMode() ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.5)';
      ctx.fillRect(px - fs * 0.4, py - fs * 0.55, fs * 0.8, fs * 1.1);
      ctx.fillStyle = color;
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(angle + Math.PI / 2);
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(chars[i], 0, 0);
      ctx.restore();
    }
    ctx.restore();
  }
}

function drawMinuteSecondHands(cx, cy, r) {
  if (isSmall) return;

  const now = new Date();
  const m = now.getUTCMinutes();
  const s = now.getUTCSeconds();
  const ms = now.getUTCMilliseconds();
  const light = isLightMode();

  const mAngle = ((m + s / 60) / 60) * Math.PI * 2 - Math.PI / 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(mAngle) * r * 0.7, cy + Math.sin(mAngle) * r * 0.7);
  ctx.strokeStyle = light ? '#444' : '#bbb';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.stroke();

  if (document.getElementById('showSeconds').checked) {
    const useSmooth = !window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const sVal = useSmooth ? (s + ms / 1000) : s;
    const sAngle = (sVal / 60) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(sAngle) * r * 0.75, cy + Math.sin(sAngle) * r * 0.75);
    ctx.strokeStyle = light ? '#c0392b' : '#e94560';
    ctx.lineWidth = 1.2;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = light ? '#c0392b' : '#e94560';
  ctx.fill();
}

function renderLegend(deduped) {
  const sorted = sortByTime(deduped);
  const el = document.getElementById('legend');
  el.innerHTML = sorted.map(z => {
    const t = getTimeInTZ(z.tz);
    const timeStr = `${String(t.h24).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`;
    return `<span class="legend-item" role="listitem">
      <span class="legend-swatch" style="background:${z.color}" aria-hidden="true"></span>
      <span>${z.label}</span>
      <span class="legend-time">${timeStr}</span>
    </span>`;
  }).join('');
}

// ── SCREEN READER ───────────────────────────────────────────────────
function updateScreenReader(deduped) {
  const now = new Date();
  const minute = now.getUTCMinutes();
  if (minute === lastSrUpdate) return;
  lastSrUpdate = minute;
  const el = document.getElementById('sr-times');
  const sorted = sortByTime(deduped);
  const lines = sorted.map(z => {
    const t = getTimeInTZ(z.tz);
    return `${z.label}: ${t.h24}:${String(t.m).padStart(2,'0')}`;
  });
  el.textContent = 'Current times \u2014 ' + lines.join(', ');
}

// ── MAIN LOOP ───────────────────────────────────────────────────────
function draw() {
  const size = parseFloat(canvas.style.width);
  const cx = size / 2;
  const cy = size / 2;
  const r = size / 2 - 20;

  ctx.clearRect(0, 0, size, size);
  drawFace(cx, cy, r);

  const labelMode = document.getElementById('labelMode').value;
  const deduped = dedupeZones(zones);
  const handWidth = isSmall ? 3.5 : 5;
  const use24 = is24h();
  const divisor = use24 ? 24 : 12;

  for (const z of deduped) {
    const t = z._time || getTimeInTZ(z.tz);
    const hVal = use24 ? (t.h24 + t.m / 60) : (t.h + t.m / 60);
    const hourAngle = (hVal / divisor) * Math.PI * 2 - Math.PI / 2;
    drawHand(cx, cy, hourAngle, r * 0.52, handWidth, z.color, z.label, labelMode);
  }

  drawMinuteSecondHands(cx, cy, r);
  renderLegend(deduped);
  updateScreenReader(deduped);

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    setTimeout(() => requestAnimationFrame(draw), 1000);
  } else {
    requestAnimationFrame(draw);
  }
}

draw();
</script>
</body>
</html>
