<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-TZ Clock</title>
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<a class="skip-link" href="#zone-bar">Skip to time zones</a>

<div id="controls" role="toolbar" aria-label="Clock display options">
  <label><input type="checkbox" id="showBezelLabels"> Bezel</label>
  <label id="showOuterCityLabel"><input type="checkbox" id="showOuterCity" checked> City</label>
  <label><input type="checkbox" id="showSeconds" checked> Sec</label>
  <label><input type="checkbox" id="use24h"> 24h</label>
</div>

<canvas id="clock" role="img" aria-label="Analog clock displaying multiple time zones"></canvas>

<div id="sr-times" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<div id="zone-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<div id="zone-bar" role="list" aria-label="Active time zones"></div>
<div id="debug-overlay" class="debug-overlay" aria-hidden="true">
  <div id="debug-main" class="debug-panel debug-main"></div>
  <div id="debug-selected" class="debug-panel debug-selected"></div>
</div>
<div id="debug-controls" role="group" aria-label="Debug options">
  <label><input type="checkbox" id="showDebug"> Debug</label>
  <label id="showDebugFramesLabel"><input type="checkbox" id="showDebugFrames"> Frames</label>
</div>

<script defer src="assets/js/clock-utils.js"></script>
<script defer src="assets/js/app.js"></script>
</body>
</html>
