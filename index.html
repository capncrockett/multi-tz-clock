<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-TZ Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --bg-surface: #16213e;
    --border: #0f3460;
    --text: #eeeeee;
    --text-muted: #aaaaaa;
    --accent: #e94560;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f0f0f5;
      --bg-surface: #ffffff;
      --border: #c0c0d0;
      --text: #1a1a2e;
      --text-muted: #555555;
      --accent: #c0392b;
    }
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  .skip-link {
    position: absolute;
    top: -100px; left: 0;
    background: var(--accent); color: #fff;
    padding: 8px 16px; z-index: 100;
    font-size: 14px; text-decoration: none;
    border-radius: 0 0 4px 0;
  }
  .skip-link:focus { top: 0; }

  #controls {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  #controls label {
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  #controls select {
    background: var(--bg-surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
  }
  #controls select:focus,
  #controls input:focus {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  canvas { display: block; }

  /* ── Unified zone bar (legend + chips + add) ── */
  #zone-bar {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    max-width: 640px;
  }
  .zone-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 3px 6px 3px 6px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
  }
  .zone-swatch {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid var(--text-muted);
    flex-shrink: 0;
  }
  .zone-time {
    font-family: 'Cascadia Mono', 'Consolas', monospace;
    opacity: 0.75;
    font-size: 12px;
  }
  .zone-remove {
    background: none; border: none;
    color: var(--text-muted);
    cursor: pointer; font-size: 15px;
    padding: 0 2px;
    line-height: 1;
  }
  .zone-remove:hover { color: var(--accent); }
  .zone-remove:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  #zone-bar select {
    background: var(--bg-surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 16px;
    font-size: 13px;
    cursor: pointer;
    max-width: 180px;
  }
  #zone-bar select:focus {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
  }

  @media (max-width: 400px) {
    #controls { gap: 6px; }
    #controls label { font-size: 12px; }
    #zone-bar {
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
  }
</style>
</head>
<body>

<a class="skip-link" href="#zone-bar">Skip to time zones</a>

<div id="controls" role="toolbar" aria-label="Clock display options">
  <label>Labels:
    <select id="labelMode" aria-label="Label display mode">
      <option value="tip">At hand tip</option>
      <option value="bezel">On bezel</option>
      <option value="legend">Legend only</option>
    </select>
  </label>
  <label>
    <input type="checkbox" id="showSeconds" checked aria-label="Toggle second hand">
    Seconds
  </label>
  <label>
    <input type="checkbox" id="use24h" aria-label="Toggle 24-hour clock">
    24h
  </label>
</div>

<canvas id="clock" role="img" aria-label="Analog clock displaying multiple time zones"></canvas>

<div id="sr-times" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<div id="zone-bar" role="list" aria-label="Active time zones"></div>

<script>
// ── CITY CATALOG ────────────────────────────────────────────────────
// Curated list grouped by region. Covers all major offsets.
const CITY_CATALOG = [
  { label: 'Baker Island',   tz: 'Etc/GMT+12' },
  { label: 'Pago Pago',     tz: 'Pacific/Pago_Pago' },
  { label: 'Honolulu',      tz: 'Pacific/Honolulu' },
  { label: 'Anchorage',     tz: 'America/Anchorage' },
  { label: 'Los Angeles',   tz: 'America/Los_Angeles' },
  { label: 'Denver',        tz: 'America/Denver' },
  { label: 'Chicago',       tz: 'America/Chicago' },
  { label: 'NYC',           tz: 'America/New_York' },
  { label: 'Halifax',       tz: 'America/Halifax' },
  { label: 'São Paulo',     tz: 'America/Sao_Paulo' },
  { label: 'Buenos Aires',  tz: 'America/Argentina/Buenos_Aires' },
  { label: 'Reykjavik',     tz: 'Atlantic/Reykjavik' },
  { label: 'London',        tz: 'Europe/London' },
  { label: 'Paris',         tz: 'Europe/Paris' },
  { label: 'Berlin',        tz: 'Europe/Berlin' },
  { label: 'Cairo',         tz: 'Africa/Cairo' },
  { label: 'Istanbul',      tz: 'Europe/Istanbul' },
  { label: 'Moscow',        tz: 'Europe/Moscow' },
  { label: 'Dubai',         tz: 'Asia/Dubai' },
  { label: 'Karachi',       tz: 'Asia/Karachi' },
  { label: 'Mumbai',        tz: 'Asia/Kolkata' },
  { label: 'Kathmandu',     tz: 'Asia/Kathmandu' },
  { label: 'Dhaka',         tz: 'Asia/Dhaka' },
  { label: 'Bangkok',       tz: 'Asia/Bangkok' },
  { label: 'Singapore',     tz: 'Asia/Singapore' },
  { label: 'Beijing',       tz: 'Asia/Shanghai' },
  { label: 'Hong Kong',     tz: 'Asia/Hong_Kong' },
  { label: 'Tokyo',         tz: 'Asia/Tokyo' },
  { label: 'Seoul',         tz: 'Asia/Seoul' },
  { label: 'Sydney',        tz: 'Australia/Sydney' },
  { label: 'Auckland',      tz: 'Pacific/Auckland' },
];

const HAND_COLORS = [
  '#e94560', '#4e9af1', '#53d8fb', '#e9b44c', '#2ecc71', '#e67e22',
];
const MAX_ZONES = 6;

// ── STATE ───────────────────────────────────────────────────────────
let zones = [
  { label: 'NYC',    tz: 'America/New_York',    color: HAND_COLORS[0] },
  { label: 'London', tz: 'Europe/London',       color: HAND_COLORS[1] },
  { label: 'Tokyo',  tz: 'Asia/Tokyo',          color: HAND_COLORS[2] },
  { label: 'Sydney', tz: 'Australia/Sydney',     color: HAND_COLORS[3] },
];

const canvas = document.getElementById('clock');
const ctx = canvas.getContext('2d');
let isSmall = false;
let lastSrUpdate = -1;

function isLightMode() {
  return window.matchMedia('(prefers-color-scheme: light)').matches;
}
function is24h() {
  return document.getElementById('use24h').checked;
}

// ── SIZING ──────────────────────────────────────────────────────────
function resize() {
  const dpr = window.devicePixelRatio || 1;
  const size = Math.min(window.innerWidth - 32, window.innerHeight - 220, 600);
  isSmall = size < 300;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ── HELPERS ─────────────────────────────────────────────────────────
function getTimeInTZ(tz) {
  const now = new Date();
  const str = now.toLocaleString('en-US', {
    timeZone: tz,
    hour: 'numeric', minute: 'numeric', second: 'numeric',
    hour12: false
  });
  const [h, m, s] = str.split(':').map(Number);
  return { h: h % 12, m, s, h24: h };
}

function getTzAbbrev(tz) {
  try {
    const parts = new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName: 'short' }).formatToParts(new Date());
    const tzPart = parts.find(p => p.type === 'timeZoneName');
    const raw = tzPart ? tzPart.value : tz.split('/').pop();
    // Strip offset like +5, -5, +5:30 etc.
    return raw.replace(/[+-]\d+(:\d+)?$/, '').trim() || raw;
  } catch {
    return tz.split('/').pop();
  }
}

function dedupeZones(list) {
  const map = new Map();
  for (const z of list) {
    const t = getTimeInTZ(z.tz);
    const key = t.h;
    if (map.has(key)) {
      const existing = map.get(key);
      if (!existing.label.includes(z.label)) {
        existing.label += ' / ' + z.label;
      }
    } else {
      map.set(key, { ...z, label: z.label, _time: t });
    }
  }
  return Array.from(map.values());
}

function sortByTime(deduped) {
  return [...deduped].sort((a, b) => {
    const ta = a._time || getTimeInTZ(a.tz);
    const tb = b._time || getTimeInTZ(b.tz);
    return (ta.h24 * 60 + ta.m) - (tb.h24 * 60 + tb.m);
  });
}

// ── ZONE BAR (merged legend + chips + add) ─────────────────────────
function renderZoneBar() {
  const bar = document.getElementById('zone-bar');
  const sorted = sortByTime(zones.map(z => ({ ...z, _time: getTimeInTZ(z.tz) })));

  let html = sorted.map(z => {
    const idx = zones.findIndex(orig => orig.tz === z.tz);
    const t = z._time || getTimeInTZ(z.tz);
    const timeStr = `${String(t.h24).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`;
    return `<span class="zone-item" role="listitem">
      <span class="zone-swatch" style="background:${z.color}" aria-hidden="true"></span>
      <span>${z.label}</span>
      <span class="zone-time">${timeStr}</span>
      <button class="zone-remove" onclick="removeZone(${idx})" aria-label="Remove ${z.label}">&times;</button>
    </span>`;
  }).join('');

  if (zones.length < MAX_ZONES) {
    const usedTzs = new Set(zones.map(z => z.tz));
    const opts = CITY_CATALOG
      .filter(c => !usedTzs.has(c.tz))
      .map(c => `<option value="${c.tz}">${c.label}</option>`)
      .join('');
    html += `<select id="addTzSelect" aria-label="Add a time zone">
      <option value="">+ Add…</option>${opts}
    </select>`;
  }
  bar.innerHTML = html;

  const sel = document.getElementById('addTzSelect');
  if (sel) sel.addEventListener('change', () => { if (sel.value) addZone(sel.value); });
}

function addZone(tz) {
  if (zones.length >= MAX_ZONES) return;
  const city = CITY_CATALOG.find(c => c.tz === tz);
  if (!city) return;
  const usedColors = new Set(zones.map(z => z.color));
  const color = HAND_COLORS.find(c => !usedColors.has(c)) || HAND_COLORS[zones.length % HAND_COLORS.length];
  zones.push({ label: city.label, tz: city.tz, color });
  renderZoneBar();
}

function removeZone(index) {
  zones.splice(index, 1);
  renderZoneBar();
}
window.removeZone = removeZone;

renderZoneBar();

// ── DAY/NIGHT CLOCK FACE (24h only) ───────────────────────────────
function drawDayNightFace(cx, cy, r) {
  const light = isLightMode();
  const dayColor   = light ? '#f5e6c8' : '#2e3a1e';
  const dayCenter  = light ? '#fdf0d5' : '#3d4a28';
  const nightColor = light ? '#d0cfc8' : '#0d1321';
  const midColor   = light ? '#e8d8b8' : '#1a2418';

  // Night base
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = nightColor;
  ctx.fill();

  // Day semicircle (top half)
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx - r, cy);
  ctx.arc(cx, cy, r, Math.PI, 0);
  ctx.closePath();
  ctx.clip();
  const dayGrad = ctx.createRadialGradient(cx, cy - r * 0.3, 0, cx, cy - r * 0.3, r * 1.1);
  dayGrad.addColorStop(0, dayCenter);
  dayGrad.addColorStop(0.6, dayColor);
  dayGrad.addColorStop(1, midColor);
  ctx.fillStyle = dayGrad;
  ctx.fillRect(cx - r, cy - r, r * 2, r);
  ctx.restore();

  // Horizon blend
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.clip();
  const horizGrad = ctx.createLinearGradient(cx, cy - 16, cx, cy + 16);
  horizGrad.addColorStop(0, midColor);
  horizGrad.addColorStop(0.5, light ? '#ddd0b0' : '#151d18');
  horizGrad.addColorStop(1, nightColor);
  ctx.fillStyle = horizGrad;
  ctx.fillRect(cx - r, cy - 16, r * 2, 32);
  ctx.restore();
}

function drawPlainFace(cx, cy, r) {
  const light = isLightMode();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = light ? '#ebe8e0' : '#16213e';
  ctx.fill();
}

// ── DRAWING ─────────────────────────────────────────────────────────
function drawFace(cx, cy, r) {
  const use24 = is24h();
  const light = isLightMode();

  // Background: day/night for 24h, plain for 12h
  if (use24) {
    drawDayNightFace(cx, cy, r);
  } else {
    drawPlainFace(cx, cy, r);
  }

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = light ? '#b0b0b8' : '#0f3460';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Tick marks — none on small viewports
  if (!isSmall) {
    for (let i = 0; i < 60; i++) {
      const isHour = i % 5 === 0;
      const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
      const inner = r * (isHour ? 0.82 : 0.88);
      const outer = r * 0.92;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(angle) * inner, cy + Math.sin(angle) * inner);
      ctx.lineTo(cx + Math.cos(angle) * outer, cy + Math.sin(angle) * outer);
      ctx.strokeStyle = isHour
        ? (light ? '#333' : '#eee')
        : (light ? '#999' : '#555');
      ctx.lineWidth = isHour ? 2.5 : 1;
      ctx.stroke();
    }
  }

  // Numerals
  const count = use24 ? 24 : 12;
  if (use24) {
    // 24h: numerals on the OUTER ring; on small viewports push to tick area
    const fontSize = isSmall ? r * 0.12 : r * 0.09;
    const numR = isSmall ? r * 0.88 : r * 0.96;
    ctx.fillStyle = light ? '#222' : '#ddd';
    ctx.font = `bold ${fontSize}px "Segoe UI", system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let n = 1; n <= 24; n++) {
      const angle = (n / 24) * Math.PI * 2 - Math.PI / 2;
      ctx.fillText(n.toString(), cx + Math.cos(angle) * numR, cy + Math.sin(angle) * numR);
    }
  } else {
    // 12h: on small viewports push to outer edge (replacing ticks)
    const fontSize = isSmall ? r * 0.18 : r * 0.14;
    const numR = isSmall ? r * 0.85 : r * 0.72;
    ctx.fillStyle = light ? '#222' : '#ddd';
    ctx.font = `bold ${fontSize}px "Segoe UI", system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let n = 1; n <= 12; n++) {
      const angle = (n / 12) * Math.PI * 2 - Math.PI / 2;
      ctx.fillText(n.toString(), cx + Math.cos(angle) * numR, cy + Math.sin(angle) * numR);
    }
  }

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, isSmall ? 3 : 5, 0, Math.PI * 2);
  ctx.fillStyle = light ? '#333' : '#eee';
  ctx.fill();
}

function drawHand(cx, cy, r, angle, length, width, color, label, tz, labelMode) {
  const tipX = cx + Math.cos(angle) * length;
  const tipY = cy + Math.sin(angle) * length;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.35)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(tipX, tipY);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();

  // Tip label
  if (label && labelMode === 'tip') {
    const labelR = length + (isSmall ? 12 : 18);
    const lx = cx + Math.cos(angle) * labelR;
    const ly = cy + Math.sin(angle) * labelR;
    const fs = isSmall ? 10 : 11;
    ctx.save();
    ctx.font = `bold ${fs}px "Segoe UI", system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const tw = ctx.measureText(label).width + 6;
    const th = fs + 4;
    ctx.fillStyle = isLightMode() ? 'rgba(255,255,255,0.85)' : 'rgba(0,0,0,0.6)';
    ctx.beginPath();
    ctx.roundRect(lx - tw / 2, ly - th / 2, tw, th, 3);
    ctx.fill();
    ctx.fillStyle = color;
    ctx.fillText(label, lx, ly);
    ctx.restore();
  }

  // Bezel label — TZ abbreviation on inner rim; city name on outer ring (large only)
  if (label && labelMode === 'bezel') {
    const light = isLightMode();
    const tzAbbrev = getTzAbbrev(tz);

    // Inner bezel: TZ abbreviation
    const fs = isSmall ? 11 : 12;
    const bezelR = r * 0.62;
    const bx = cx + Math.cos(angle) * bezelR;
    const by = cy + Math.sin(angle) * bezelR;

    ctx.save();
    ctx.translate(bx, by);

    // Flip at 3 and 9 o'clock: text on the right half of the clock (3→6→9)
    // needs to be flipped so it reads right-side-up.
    // Our angle: -π/2 = 12 o'clock, 0 = 3 o'clock, π/2 = 6 o'clock, π = 9 o'clock
    // Right half (bottom arc from 3 to 9 going clockwise): angle > 0 && angle < π
    const needsFlip = angle > 0 && angle < Math.PI;

    if (needsFlip) {
      ctx.rotate(angle + Math.PI / 2 + Math.PI);
    } else {
      ctx.rotate(angle + Math.PI / 2);
    }

    ctx.font = `bold ${fs}px "Segoe UI", system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const tw = ctx.measureText(tzAbbrev).width + 6;
    const th = fs + 3;
    ctx.fillStyle = light ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.55)';
    ctx.beginPath();
    ctx.roundRect(-tw / 2, -th / 2, tw, th, 3);
    ctx.fill();
    ctx.fillStyle = color;
    ctx.fillText(tzAbbrev, 0, 0);
    ctx.restore();

    // Outer ring: city name (large viewports only)
    if (!isSmall) {
      const outerFs = 10;
      const outerR = r + 16;
      const ox = cx + Math.cos(angle) * outerR;
      const oy = cy + Math.sin(angle) * outerR;

      ctx.save();
      ctx.translate(ox, oy);
      if (needsFlip) {
        ctx.rotate(angle + Math.PI / 2 + Math.PI);
      } else {
        ctx.rotate(angle + Math.PI / 2);
      }
      ctx.font = `bold ${outerFs}px "Segoe UI", system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = color;
      ctx.fillText(label, 0, 0);
      ctx.restore();
    }
  }
}

function drawMinuteSecondHands(cx, cy, r) {
  if (isSmall) return;

  const now = new Date();
  const m = now.getUTCMinutes();
  const s = now.getUTCSeconds();
  const ms = now.getUTCMilliseconds();
  const light = isLightMode();

  const mAngle = ((m + s / 60) / 60) * Math.PI * 2 - Math.PI / 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(mAngle) * r * 0.7, cy + Math.sin(mAngle) * r * 0.7);
  ctx.strokeStyle = light ? '#444' : '#bbb';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.stroke();

  if (document.getElementById('showSeconds').checked) {
    const useSmooth = !window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const sVal = useSmooth ? (s + ms / 1000) : s;
    const sAngle = (sVal / 60) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(sAngle) * r * 0.75, cy + Math.sin(sAngle) * r * 0.75);
    ctx.strokeStyle = light ? '#c0392b' : '#e94560';
    ctx.lineWidth = 1.2;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = light ? '#c0392b' : '#e94560';
  ctx.fill();
}

// Legend is now part of the zone bar — no separate render needed

// ── SCREEN READER ───────────────────────────────────────────────────
function updateScreenReader(deduped) {
  const now = new Date();
  const minute = now.getUTCMinutes();
  if (minute === lastSrUpdate) return;
  lastSrUpdate = minute;
  const el = document.getElementById('sr-times');
  const sorted = sortByTime(deduped);
  const lines = sorted.map(z => {
    const t = getTimeInTZ(z.tz);
    return `${z.label}: ${t.h24}:${String(t.m).padStart(2,'0')}`;
  });
  el.textContent = 'Current times \u2014 ' + lines.join(', ');
}

// ── MAIN LOOP ───────────────────────────────────────────────────────
function draw() {
  const size = parseFloat(canvas.style.width);
  const cx = size / 2;
  const cy = size / 2;
  const r = size / 2 - 20;

  ctx.clearRect(0, 0, size, size);
  drawFace(cx, cy, r);

  const labelMode = document.getElementById('labelMode').value;
  const deduped = dedupeZones(zones);
  const handWidth = isSmall ? 3.5 : 5;
  const use24 = is24h();
  const divisor = use24 ? 24 : 12;

  for (const z of deduped) {
    const t = z._time || getTimeInTZ(z.tz);
    const hVal = use24 ? (t.h24 + t.m / 60) : (t.h + t.m / 60);
    const hourAngle = (hVal / divisor) * Math.PI * 2 - Math.PI / 2;
    drawHand(cx, cy, r, hourAngle, r * 0.52, handWidth, z.color, z.label, z.tz, labelMode);
  }

  drawMinuteSecondHands(cx, cy, r);
  renderZoneBar();
  updateScreenReader(deduped);

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    setTimeout(() => requestAnimationFrame(draw), 1000);
  } else {
    requestAnimationFrame(draw);
  }
}

draw();
</script>
</body>
</html>
