name: Vercel Browser Deploy

on:
  pull_request:
    paths:
      - index.html
      - assets/**
      - .vercelignore
      - package.json
      - .github/workflows/vercel-browser.yml
  push:
    branches:
      - main
    paths:
      - index.html
      - assets/**
      - .vercelignore
      - package.json
      - .github/workflows/vercel-browser.yml
  workflow_dispatch:

concurrency:
  group: vercel-browser-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERCEL_CLI_TELEMETRY_DISABLED: "1"

jobs:
  preview:
    name: Browser Preview (Vercel)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check Vercel repo secrets
        id: vercel-secrets
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing Vercel secrets for this repository; skipping preview deploy." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check out repository
        if: steps.vercel-secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.vercel-secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run browser verification
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: npm test

      - name: Pull Vercel preview settings
        if: steps.vercel-secrets.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npm run vercel:pull:preview -- --token "$VERCEL_TOKEN"

      - name: Build Vercel deployment
        if: steps.vercel-secrets.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npm run vercel:build -- --token "$VERCEL_TOKEN"

      - name: Deploy browser preview
        if: steps.vercel-secrets.outputs.ready == 'true'
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          deployment_url="$(npm run --silent vercel:deploy:preview -- --token "$VERCEL_TOKEN")"
          echo "Preview deployment: $deployment_url" >> "$GITHUB_STEP_SUMMARY"

  production:
    name: Browser Production (Vercel)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check Vercel repo secrets
        id: vercel-secrets
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing Vercel secrets for this repository; skipping production deploy." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check out repository
        if: steps.vercel-secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.vercel-secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run browser verification
        if: steps.vercel-secrets.outputs.ready == 'true'
        run: npm test

      - name: Pull Vercel production settings
        if: steps.vercel-secrets.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npm run vercel:pull:production -- --token "$VERCEL_TOKEN"

      - name: Build Vercel production deployment
        if: steps.vercel-secrets.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npm run vercel:build -- --prod --token "$VERCEL_TOKEN"

      - name: Deploy browser production
        if: steps.vercel-secrets.outputs.ready == 'true'
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          deployment_url="$(npm run --silent vercel:deploy:production -- --token "$VERCEL_TOKEN")"
          echo "Production deployment: $deployment_url" >> "$GITHUB_STEP_SUMMARY"
